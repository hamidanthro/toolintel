<html lang="en-US">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8fafc">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <title>Timetable — MySpace — GradeEarn</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="myspace-page" data-myspace-active="timetable" data-myspace-page-title="Timetable">
<div class="ms-shell" id="ms-shell-mount"></div>

<section class="ms-subpage" id="ms-subpage-content">
  <header class="ms-subpage-head">
    <h2>This week</h2>
    <button type="button" class="ms-primary-btn" id="ms-timetable-add">Add class</button>
  </header>

  <div class="ms-timetable" id="ms-timetable-grid">
    <!-- 7-day grid filled by JS -->
  </div>
</section>

<div class="ms-overlay" id="ms-timetable-overlay" hidden>
  <div class="ms-overlay-card">
    <div class="ms-overlay-head">
      <h3>Add class</h3>
      <button type="button" class="ms-icon-btn" id="ms-timetable-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <select id="ms-timetable-day">
      <option value="Mon">Monday</option>
      <option value="Tue">Tuesday</option>
      <option value="Wed">Wednesday</option>
      <option value="Thu">Thursday</option>
      <option value="Fri">Friday</option>
      <option value="Sat">Saturday</option>
      <option value="Sun">Sunday</option>
    </select>
    <input type="time" id="ms-timetable-start">
    <input type="text" id="ms-timetable-subject" placeholder="Subject (e.g. Math)" maxlength="40">
    <input type="text" id="ms-timetable-room" placeholder="Room or teacher (optional)" maxlength="40">
    <div class="ms-overlay-actions">
      <button type="button" class="ms-secondary-btn" id="ms-timetable-cancel">Cancel</button>
      <button type="button" class="ms-primary-btn" id="ms-timetable-save">Add</button>
    </div>
  </div>
</div>

<script src="/js/auth.js?v=20260517k"></script>
<script src="/js/myspace.js?v=20260515b"></script>
</body>
</html>
