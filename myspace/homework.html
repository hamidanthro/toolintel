<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com https://api.gradeearn.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8fafc">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <title>Homework — MySpace — GradeEarn</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=20260512g">
  <script>window.STAARAuth = window.STAARAuth || {}; window.STAARAuth.requireLoginOnLoad = true;</script>
</head>
<body class="myspace-page" data-myspace-active="homework" data-myspace-page-title="Homework">
<div class="ms-shell" id="ms-shell-mount"></div>

<section class="ms-subpage" id="ms-subpage-content">
  <div class="ms-empty">
    <div class="ms-empty-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <h2 class="ms-empty-title">Your homework lives here</h2>
    <p class="ms-empty-text">Add what's due, by when, and check it off as you finish. No more "I forgot."</p>
    <button type="button" class="ms-primary-btn" id="ms-homework-new">Add homework</button>
  </div>

  <div class="ms-list" id="ms-homework-list" hidden></div>
</section>

<div class="ms-overlay" id="ms-homework-overlay" hidden>
  <div class="ms-overlay-card">
    <div class="ms-overlay-head">
      <h3>Add homework</h3>
      <button type="button" class="ms-icon-btn" id="ms-homework-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <input type="text" id="ms-homework-subject" placeholder="Subject (e.g. Math)" maxlength="40">
    <input type="text" id="ms-homework-title" placeholder="What's due? (e.g. Worksheet 4.2)" maxlength="120">
    <input type="date" id="ms-homework-due">
    <textarea id="ms-homework-notes" rows="4" placeholder="Notes (optional)"></textarea>
    <div class="ms-overlay-actions">
      <button type="button" class="ms-secondary-btn" id="ms-homework-cancel">Cancel</button>
      <button type="button" class="ms-primary-btn" id="ms-homework-save">Add</button>
    </div>
  </div>
</div>

<script src="/js/auth.js?v=20260511c"></script>
<script src="/js/myspace.js?v=20260512b"></script>
</body>
</html>
