<body class="myspace-page" data-myspace-active="homework" data-myspace-page-title="Homework">
<div class="ms-shell" id="ms-shell-mount"></div>

<!-- §57 Homework page — same scaffold pattern as Tasks (§44). Date
     eyebrow → title → top-right outlined Add affordance → four
     section scaffolds (Due today / This week / Later / Done). No
     bordered empty-state card; the architecture IS the empty state. -->
<section class="ms-subpage ms-hw-page" id="ms-subpage-content">
  <header class="ms-page-head">
    <div>
      <div class="ms-date-eyebrow" id="ms-hw-date-eyebrow"></div>
      <h2 class="ms-page-title">Your homework</h2>
    </div>
    <button type="button" class="ms-top-action" id="ms-homework-new" aria-label="Add homework">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>Add homework</span>
    </button>
  </header>

  <div class="ms-section" data-section="today">
    <div class="ms-section-head">
      <span class="ms-section-eyebrow">Due today</span>
      <span class="ms-section-count" id="ms-hw-count-today">0</span>
    </div>
    <ul class="ms-hw-list" id="ms-hw-list-today"></ul>
    <p class="ms-section-empty" id="ms-hw-empty-today">Nothing due today.</p>
  </div>

  <div class="ms-section" data-section="week">
    <div class="ms-section-head">
      <span class="ms-section-eyebrow">This week</span>
      <span class="ms-section-count" id="ms-hw-count-week">0</span>
    </div>
    <ul class="ms-hw-list" id="ms-hw-list-week"></ul>
    <p class="ms-section-empty" id="ms-hw-empty-week">Nothing this week yet.</p>
  </div>

  <div class="ms-section" data-section="later">
    <div class="ms-section-head">
      <span class="ms-section-eyebrow">Later</span>
      <span class="ms-section-count" id="ms-hw-count-later">0</span>
    </div>
    <ul class="ms-hw-list" id="ms-hw-list-later"></ul>
    <p class="ms-section-empty" id="ms-hw-empty-later">No future homework added.</p>
  </div>

  <div class="ms-section" data-section="done">
    <div class="ms-section-head">
      <span class="ms-section-eyebrow">Done</span>
      <span class="ms-section-count" id="ms-hw-count-done">0</span>
    </div>
    <ul class="ms-hw-list" id="ms-hw-list-done"></ul>
    <p class="ms-section-empty" id="ms-hw-empty-done">Completed homework shows up here.</p>
  </div>
</section>

<div class="ms-overlay" id="ms-homework-overlay" hidden>
  <div class="ms-overlay-card">
    <div class="ms-overlay-head">
      <h3>Add homework</h3>
      <button type="button" class="ms-icon-btn" id="ms-homework-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <input type="text" id="ms-homework-subject" placeholder="Subject (e.g. Math)" maxlength="40">
    <input type="text" id="ms-homework-title" placeholder="What's due? (e.g. Worksheet 4.2)" maxlength="120">
    <input type="date" id="ms-homework-due">
    <textarea id="ms-homework-notes" rows="4" placeholder="Notes (optional)"></textarea>
    <div class="ms-overlay-actions">
      <button type="button" class="ms-secondary-btn" id="ms-homework-cancel">Cancel</button>
      <button type="button" class="ms-primary-btn" id="ms-homework-save">Add</button>
    </div>
  </div>
</div>

<script src="/js/auth.js?v=20260514a"></script>
<script src="/js/myspace.js?v=20260513b"></script>
</body>
</html>
