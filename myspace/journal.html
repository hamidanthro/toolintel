<body class="myspace-page" data-myspace-active="journal" data-myspace-page-title="Journal">
<div class="ms-shell" id="ms-shell-mount"></div>

<!-- §57 Journal page — same scaffold pattern as Tasks/Homework. Three
     sections (Today / This week / Earlier). The architecture is the
     empty state; no bordered card, no centered icon, no gold-filled CTA. -->
<section class="ms-subpage ms-jr-page" id="ms-subpage-content">
  <header class="ms-page-head">
    <div>
      <div class="ms-date-eyebrow" id="ms-jr-date-eyebrow"></div>
      <h2 class="ms-page-title">Your journal</h2>
    </div>
    <button type="button" class="ms-top-action" id="ms-journal-new" aria-label="Write a new entry">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>New entry</span>
    </button>
  </header>

  <div class="ms-section" data-section="today">
    <div class="ms-section-head">
      <span class="ms-section-eyebrow">Today</span>
      <span class="ms-section-count" id="ms-jr-count-today">0</span>
    </div>
    <ul class="ms-jr-list" id="ms-jr-list-today"></ul>
    <p class="ms-section-empty" id="ms-jr-empty-today">Nothing written today. Even one sentence counts.</p>
  </div>

  <div class="ms-section" data-section="week">
    <div class="ms-section-head">
      <span class="ms-section-eyebrow">This week</span>
      <span class="ms-section-count" id="ms-jr-count-week">0</span>
    </div>
    <ul class="ms-jr-list" id="ms-jr-list-week"></ul>
    <p class="ms-section-empty" id="ms-jr-empty-week">No entries this week yet.</p>
  </div>

  <div class="ms-section" data-section="earlier">
    <div class="ms-section-head">
      <span class="ms-section-eyebrow">Earlier</span>
      <span class="ms-section-count" id="ms-jr-count-earlier">0</span>
    </div>
    <ul class="ms-jr-list" id="ms-jr-list-earlier"></ul>
    <p class="ms-section-empty" id="ms-jr-empty-earlier">Older entries will collect here.</p>
  </div>
</section>

<!-- Journal editor overlay -->
<div class="ms-overlay" id="ms-journal-overlay" hidden>
  <div class="ms-overlay-card">
    <div class="ms-overlay-head">
      <h3 id="ms-journal-overlay-title">New entry</h3>
      <button type="button" class="ms-icon-btn" id="ms-journal-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <input type="text" id="ms-journal-title" placeholder="A short title (optional)" maxlength="80">
    <textarea id="ms-journal-text" rows="10" placeholder="What did you learn today? What was confusing? What clicked?"></textarea>
    <div class="ms-overlay-actions">
      <button type="button" class="ms-secondary-btn" id="ms-journal-cancel">Cancel</button>
      <button type="button" class="ms-primary-btn" id="ms-journal-save">Save entry</button>
    </div>
  </div>
</div>

<script src="/js/auth.js?v=20260517k"></script>
<script src="/js/myspace.js?v=20260515b"></script>
</body>
</html>
