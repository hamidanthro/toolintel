<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com https://api.gradeearn.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8fafc">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <title>Journal — MySpace — GradeEarn</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=20260512r">
  <script>window.STAARAuth = window.STAARAuth || {}; window.STAARAuth.requireLoginOnLoad = true;</script>
</head>
<body class="myspace-page" data-myspace-active="journal" data-myspace-page-title="Journal">
<div class="ms-shell" id="ms-shell-mount"></div>

<section class="ms-subpage" id="ms-subpage-content">
  <!-- Filled by JS based on state -->
  <div class="ms-empty">
    <div class="ms-empty-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <h2 class="ms-empty-title">Your journal lives here</h2>
    <p class="ms-empty-text">Write what you learned today, what was hard, what clicked. Even one sentence counts.</p>
    <button type="button" class="ms-primary-btn" id="ms-journal-new">Write your first entry</button>
  </div>

  <div class="ms-list" id="ms-journal-list" hidden></div>
</section>

<!-- Journal editor overlay -->
<div class="ms-overlay" id="ms-journal-overlay" hidden>
  <div class="ms-overlay-card">
    <div class="ms-overlay-head">
      <h3 id="ms-journal-overlay-title">New entry</h3>
      <button type="button" class="ms-icon-btn" id="ms-journal-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <input type="text" id="ms-journal-title" placeholder="A short title (optional)" maxlength="80">
    <textarea id="ms-journal-text" rows="10" placeholder="What did you learn today? What was confusing? What clicked?"></textarea>
    <div class="ms-overlay-actions">
      <button type="button" class="ms-secondary-btn" id="ms-journal-cancel">Cancel</button>
      <button type="button" class="ms-primary-btn" id="ms-journal-save">Save entry</button>
    </div>
  </div>
</div>

<script src="/js/auth.js?v=20260511c"></script>
<script src="/js/myspace.js?v=20260512e"></script>
</body>
</html>
