<body class="myspace-page" data-myspace-active="tasks" data-myspace-page-title="Tasks">
<div class="ms-shell" id="ms-shell-mount"></div>

<section class="ms-subpage" id="ms-subpage-content">
  <header class="ms-subpage-head">
    <h2>Your tasks</h2>
    <form class="ms-task-add" id="ms-task-form" autocomplete="off">
      <input type="text" id="ms-task-input" placeholder="Add a task and press Enter" maxlength="120">
      <button type="submit" class="ms-primary-btn">Add</button>
    </form>
  </header>

  <div class="ms-empty" id="ms-tasks-empty">
    <div class="ms-empty-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3 7 5 9 9 5"/><line x1="13" y1="7" x2="21" y2="7"/>
        <polyline points="3 14 5 16 9 12"/><line x1="13" y1="14" x2="21" y2="14"/>
        <polyline points="3 21 5 23 9 19"/><line x1="13" y1="21" x2="21" y2="21"/>
      </svg>
    </div>
    <h2 class="ms-empty-title">Your tasks live here</h2>
    <p class="ms-empty-text">Anything small — "finish Ch. 3 by Friday," "ask teacher about Q7." One line each.</p>
  </div>

  <ul class="ms-task-list" id="ms-task-list" hidden></ul>
</section>

<script src="/js/auth.js?v=20260511c"></script>
<script src="/js/myspace.js?v=20260512b"></script>
