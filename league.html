<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com https://api.gradeearn.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060d1f" />
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <title>Friend League — GradeEarn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=20260517f" />
</head>
<body class="league-page">
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand brand--wordmark"><span class="brand-text">Grade<span class="brand-text-accent">Earn</span></span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="achievements.html">Trophies</a>
        <a href="league.html" class="active">League</a>
        <a href="games.html">Games</a>
        <a href="marketplace.html">Toys</a>
        <a href="about.html">How it works</a>
      </nav>
      <div id="user-slot" class="user-slot"></div>
    </div>
  </header>

  <section>
    <div class="container">
      <div id="league-requests-banner" class="league-banner" hidden>
        <span class="league-banner-icon" aria-hidden="true">👋</span>
        <span class="league-banner-text" id="league-requests-banner-text"></span>
        <button type="button" class="league-banner-btn" id="league-banner-open">Review</button>
      </div>

      <div class="league-shell">
        <!-- League identity row: Bronze/Silver/Gold/Diamond.
             TODO(lambda): handleFriendLeague should derive tier from
             lifetimeCorrect server-side. Hardcoded Bronze for everyone
             until the cron + tier table land. -->
        <div class="league-identity-row">
          <div class="league-tier-name">
            <span class="league-tier-emoji" aria-hidden="true">🥉</span>
            <span class="league-tier-label">Bronze League</span>
          </div>
        </div>

        <div class="league-eyebrow-row">
          <span class="league-eyebrow">
            <span class="league-eyebrow-dot" aria-hidden="true"></span>
            <span class="league-eyebrow-text">This week</span>
            <span class="league-eyebrow-sep" aria-hidden="true">·</span>
            <span class="league-eyebrow-sub">Resets in</span>
            <span id="leagueResetCountdown" class="league-eyebrow-countdown">—</span>
          </span>
        </div>

        <div id="league-podium" class="league-podium" role="region" aria-label="Top three this week"></div>
        <div id="league-you-card" class="league-you-card" hidden></div>
        <div id="league-list" class="league-list"></div>

        <div id="league-manage-row" class="league-manage-row" hidden>
          <button type="button" class="league-manage-link" id="btn-manage-friends">Manage friends ›</button>
        </div>

        <p id="league-foot" class="league-foot" hidden>
          Ranked by this week. <span id="league-foot-lifetime"></span>
        </p>
      </div>
    </div>
  </section>

  <div id="league-sheet" class="league-sheet" hidden>
    <div class="league-sheet-backdrop" id="league-sheet-backdrop" aria-hidden="true"></div>
    <div class="league-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="league-sheet-title">
      <div class="league-sheet-grab" aria-hidden="true"></div>
      <button type="button" class="league-sheet-close" id="league-sheet-close" aria-label="Close">✕</button>
      <div id="league-sheet-body"></div>
    </div>
  </div>

  <div id="league-toast" class="league-toast" hidden role="status" aria-live="polite"></div>

  <script src="js/auth.js?v=20260517a"></script>
  <script src="js/league.js?v=20260511g"></script>
  <script src="/js/site-header.js?v=20260517f"></script>
</body>
</html>
