<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grades — STAAR Math Prep</title>
  <link rel="stylesheet" href="css/styles.css?v=20260425x" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">STAAR<span>Prep</span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="marketplace.html">Toys</a> <a href="about.html">About</a>
      </nav>
      <div id="user-slot" class="user-slot"></div>
    </div>
  </header>

  <section>
    <div class="container">
      <h2 id="grade-heading">All STAAR math levels</h2>
      <div class="grade-grid" id="grade-grid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">&copy; <span id="year"></span> STAAR Prep.</div>
  </footer>

  <script src="js/auth.js?v=20260425v"></script>
  <!-- guests can browse grades; login is gated after 100 free practice questions -->
  <script src="js/staar-data.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const grid = document.getElementById('grade-grid');
    const Auth = window.STAARAuth || {};
    const minLevel = Auth.userGradeLevel ? Auth.userGradeLevel() : -Infinity;
    const heading = document.getElementById('grade-heading');
    if (minLevel > -Infinity && heading) heading.textContent = 'Your grade and beyond';
    const visible = window.STAAR_GRADES.filter(g => Auth.gradeLevel ? Auth.gradeLevel(g.slug) >= minLevel : true);
    visible.forEach(g => {
      const a = document.createElement('a');
      a.href = `grade.html?g=${g.slug}`;
      a.className = 'grade-card';
      a.innerHTML = `
        <div class="label">STAAR Math</div>
        <div class="title">${g.title}</div>
        <div class="desc">${g.categories.length} reporting categories</div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
