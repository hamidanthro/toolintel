<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060d1f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>Grade — StarTest</title>
  <link rel="stylesheet" href="css/styles.css?v=20260427cc" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><svg class="brand-logo" viewBox="0 0 32 32" aria-hidden="true" focusable="false"><defs><linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fde047"/><stop offset="55%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs><path d="M16 2.6 19.6 11.5 29.2 12.2 21.8 18.4 24.2 27.6 16 22.4 7.8 27.6 10.2 18.4 2.8 12.2 12.4 11.5 Z" fill="url(#starGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="0.6" stroke-linejoin="round"/><circle cx="25" cy="6" r="1.6" fill="#fde047" opacity="0.95"/><circle cx="25" cy="6" r="3" fill="#fde047" opacity="0.25"/></svg><span class="brand-text">Star<span class="brand-text-accent">Test</span></span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="marketplace.html">Toys</a> <a href="about.html">How it works</a>
      </nav>
      <div id="user-slot" class="user-slot"></div>
    </div>
  </header>

  <section>
    <div class="container" id="content">
      <p>Loading curriculum…</p>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">&copy; <span id="year"></span> StarTest.</div>
  </footer>

  <script src="js/prefs.js?v=20260426a"></script>
  <script src="js/fx.js?v=20260426a"></script>
  <script src="js/auth.js?v=20260427k"></script>
  <script src="js/friends.js?v=20260426b"></script>
  <script src="js/staar-data.js"></script>
  <script src="js/grade-card.js?v=20260427r"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const params = new URLSearchParams(location.search);
    const slug = params.get('g');
    const grade = window.STAAR_GRADES.find(g => g.slug === slug);
    const content = document.getElementById('content');
    const _u = (window.STAARAuth?.currentUser && window.STAARAuth.currentUser()) || null;

    if (!grade) {
      content.innerHTML = '<h2>Grade not found</h2><p><a href="index.html">Back home</a></p>';
    } else if (window.STAARGradeAccess && !window.STAARGradeAccess.canPracticeGrade(_u, grade.slug)) {
      // Redirect to user's actual grade rather than a dead end.
      const target = (_u && _u.grade) || null;
      if (target && target !== grade.slug) {
        try { location.replace(`grade.html?g=${encodeURIComponent(target)}`); }
        catch (_) {
          content.innerHTML = `<h2>${grade.title} is below your level</h2><div class="card"><p style="color:var(--muted);">You're set to a higher grade, so this grade is locked. Pick your grade or higher from your dashboard.</p><p><a class="btn btn-primary" href="index.html">Back to dashboard</a></p></div>`;
        }
      } else {
        content.innerHTML = `<h2>${grade.title} is below your level</h2><div class="card"><p style="color:var(--muted);">You're set to a higher grade, so this grade is locked. Pick your grade or higher from your dashboard.</p><p><a class="btn btn-primary" href="index.html">Back to dashboard</a></p></div>`;
      }
    } else {
      document.title = `${grade.title} — StarTest`;
      fetch(`data/${grade.slug}-curriculum.json`)
        .then(r => r.ok ? r.json() : null)
        .then(curr => curr && curr.units ? renderCurriculum(grade, curr) : renderCategoryFallback(grade))
        .catch(() => renderCategoryFallback(grade));
    }

    function renderCurriculum(grade, curr) {
      const mastered = (window.STAARAuth?.currentUser?.()?.masteredSections) || {};
      const masteredKey = (uId, lId) => {
        const parts = [grade.slug, uId];
        if (lId) parts.push(lId);
        return parts.join('|').replace(/[^A-Za-z0-9_\-|:.]/g, '_');
      };
      const badge = '<span class="mastered-badge" title="Section mastered">⭐ Mastered</span>';
      const units = curr.units
        .slice()
        .sort((a, b) => a.order - b.order)
        .map(u => {
          const uMastered = !!mastered[masteredKey(u.id)];
          const lessons = u.lessons.map(l => {
            const lMastered = !!mastered[masteredKey(u.id, l.id)];
            return `
            <li class="${lMastered ? 'lesson-mastered' : ''}">
              <a href="practice.html?g=${grade.slug}&u=${u.id}&l=${l.id}">
                <span class="lesson-title">${l.title}${lMastered ? ' ' + badge : ''}</span>
                <span class="lesson-teks">TEKS ${l.teks}</span>
              </a>
            </li>`;
          }).join('');
          return `
            <div class="unit-card ${uMastered ? 'unit-mastered' : ''}">
              <div class="unit-head">
                <div class="unit-order">Unit ${u.order}${uMastered ? ' ' + badge : ''}</div>
                <h3>${u.title}</h3>
                <div class="unit-cat">${u.reportingCategory}</div>
                <p class="unit-summary">${u.summary}</p>
              </div>
              <ul class="lesson-list">${lessons}</ul>
              <a class="btn btn-primary unit-practice" href="practice.html?g=${grade.slug}&u=${u.id}">${uMastered ? 'Review (no points)' : 'Practice this unit'}</a>
            </div>`;
        }).join('');

      content.innerHTML = `
        <div class="grade-header">
          <h2>${curr.title}</h2>
          <p style="color:var(--muted);max-width:720px;">${curr.description}</p>
          <a class="btn btn-primary" href="practice.html?g=${grade.slug}">Start full practice</a>
        </div>
        <div class="unit-list">${units}</div>`;
    }

    function renderCategoryFallback(grade) {
      const cats = grade.categories.map(c => `
        <a class="grade-card" href="practice.html?g=${grade.slug}&c=${encodeURIComponent(c)}">
          <div class="label">Reporting category</div>
          <div class="title">${c}</div>
          <div class="desc">Practice problems</div>
        </a>`).join('');
      content.innerHTML = `
        <h2>${grade.title}</h2>
        <p style="color:var(--muted);max-width:640px;">Detailed curriculum coming soon. Choose a reporting category to start practicing.</p>
        <div class="grade-grid">${cats}</div>`;
    }
  </script>
  <script src="https://api.replyquik.com/widget.js" data-id="9686745a-93c1-4761-af94-f15815680bc3"></script>
</body>
</html>
