<body class="facts-page">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><svg class="brand-logo" viewBox="0 0 32 32" aria-hidden="true" focusable="false"><defs><linearGradient id="starGradF" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fde047"/><stop offset="55%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs><path d="M16 2.6 19.6 11.5 29.2 12.2 21.8 18.4 24.2 27.6 16 22.4 7.8 27.6 10.2 18.4 2.8 12.2 12.4 11.5 Z" fill="url(#starGradF)" stroke="rgba(255,255,255,0.18)" stroke-width="0.6" stroke-linejoin="round"/></svg><span class="brand-text">Grade<span class="brand-text-accent">Earn</span></span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="myspace.html">MySpace</a>
        <a href="achievements.html">Trophies</a>
        <a href="league.html">League</a>
        <a href="games.html">Games</a>
        <a href="marketplace.html">Toys</a>
      </nav>
      <div id="user-slot" class="user-slot"></div>
    </div>
  </header>

  <main class="facts-main">
    <div class="facts-inner">

      <header class="facts-page-head">
        <span class="facts-eyebrow">Fun Facts</span>
        <h1 class="facts-title">Stuff worth knowing</h1>
        <p class="facts-sub" id="facts-sub">Pick a subject and an age band to browse.</p>
      </header>

      <!-- Subject pills (math / reading / science / all) -->
      <div class="facts-filter-row" role="radiogroup" aria-label="Subject">
        <button type="button" class="facts-pill facts-pill--active" data-filter="subject" data-value="all" role="radio" aria-checked="true">All</button>
        <button type="button" class="facts-pill" data-filter="subject" data-value="math"    role="radio" aria-checked="false">Math</button>
        <button type="button" class="facts-pill" data-filter="subject" data-value="reading" role="radio" aria-checked="false">Reading</button>
        <button type="button" class="facts-pill" data-filter="subject" data-value="science" role="radio" aria-checked="false">Science</button>
      </div>

      <!-- Grade-band pills (k-2 / 3-4 / 5-8 / all) -->
      <div class="facts-filter-row facts-filter-row--second" role="radiogroup" aria-label="Age band">
        <button type="button" class="facts-pill facts-pill--active" data-filter="grade" data-value="all" role="radio" aria-checked="true">All ages</button>
        <button type="button" class="facts-pill" data-filter="grade" data-value="k-2" role="radio" aria-checked="false">K–2</button>
        <button type="button" class="facts-pill" data-filter="grade" data-value="3-4" role="radio" aria-checked="false">Grades 3–4</button>
        <button type="button" class="facts-pill" data-filter="grade" data-value="5-8" role="radio" aria-checked="false">Grades 5–8</button>
      </div>

      <!-- Stats line: "147 facts · 18 you've seen" -->
      <div class="facts-meta" id="facts-meta" hidden>
        <span id="facts-count">0</span> facts<span class="facts-meta-sep">·</span>
        <span id="facts-seen-count">0</span> you've seen
      </div>

      <!-- Feed — fact cards. Populated by js/facts.js. -->
      <div class="facts-feed" id="facts-feed" aria-live="polite"></div>

      <!-- Empty state (shown when 0 facts match the active filters) -->
      <div class="facts-empty" id="facts-empty" hidden>
        <p>No facts match those filters yet.</p>
        <p class="facts-empty-sub">Try a different subject or age band.</p>
      </div>

      <!-- Load-more (large catalog; paginated 30 per page) -->
      <button type="button" class="facts-loadmore" id="facts-loadmore" hidden>Show more facts</button>

    </div>
  </main>
