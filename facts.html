<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com https://api.gradeearn.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Fun Facts — GradeEarn</title>
  <meta name="description" content="An AI-powered fact deck. One card at a time. Tap to learn why." />
  <meta name="robots" content="noindex, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=20260516a" />
</head>
<body class="facts-page facts-page--deck">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand brand--wordmark"><span class="brand-text">Grade<span class="brand-text-accent">Earn</span></span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="myspace.html">MySpace</a>
        <a href="achievements.html">Trophies</a>
        <a href="league.html">League</a>
        <a href="games.html">Games</a>
        <a href="marketplace.html">Toys</a>
      </nav>
      <div id="user-slot" class="user-slot"></div>
    </div>
  </header>

  <main class="deck-main">
    <div class="deck-inner">

      <!-- Compact header: eyebrow + filter chip + position label -->
      <header class="deck-head">
        <span class="deck-eyebrow">Fun Facts</span>
        <button type="button" class="deck-filter-chip" id="deck-filter-chip" aria-haspopup="dialog">
          🎯 <span id="deck-filter-label">All subjects · All ages</span>
          <span class="deck-filter-chip-arrow" aria-hidden="true">▾</span>
        </button>
        <div class="deck-position" id="deck-position" aria-live="polite">— of —</div>
      </header>

      <!-- Card stack (focal + 2 ghost cards) -->
      <div class="deck-stage" id="deck-stage" aria-live="polite">
        <div class="deck-card deck-card--ghost deck-card--ghost-2" aria-hidden="true"></div>
        <div class="deck-card deck-card--ghost deck-card--ghost-1" aria-hidden="true"></div>
        <article class="deck-card deck-card--focal" id="deck-card-focal" tabindex="0" aria-label="Fact card">
          <div class="deck-card-head">
            <div class="deck-card-emoji-tile" aria-hidden="true" id="deck-emoji">💡</div>
            <span class="deck-card-cat" id="deck-cat">Loading</span>
          </div>
          <p class="deck-card-fact" id="deck-fact">Loading a fact for you…</p>
          <div class="deck-card-why" id="deck-why" hidden></div>
          <div class="deck-card-actions">
            <button type="button" class="deck-action deck-action--why" id="deck-btn-why" aria-label="Why is this true?">
              <span class="deck-action-emoji" aria-hidden="true">🤔</span>
              <span class="deck-action-label">Why?</span>
            </button>
            <button type="button" class="deck-action deck-action--weirder" id="deck-btn-weirder" aria-label="Show me a weirder fact">
              <span class="deck-action-emoji" aria-hidden="true">🎲</span>
              <span class="deck-action-label">Even weirder</span>
            </button>
            <button type="button" class="deck-action deck-action--save" id="deck-btn-save" aria-label="Save this fact" aria-pressed="false">
              <span class="deck-action-emoji deck-heart" aria-hidden="true">💚</span>
              <span class="deck-action-label">Save</span>
            </button>
          </div>
        </article>
      </div>

      <!-- Empty state -->
      <div class="deck-empty" id="deck-empty" hidden>
        <p>No facts match those filters yet.</p>
        <button type="button" class="deck-empty-cta" id="deck-empty-cta">Reset filters</button>
      </div>

      <!-- Navigation row -->
      <div class="deck-nav" id="deck-nav">
        <button type="button" class="deck-nav-btn deck-nav-btn--prev" id="deck-prev" aria-label="Previous fact">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="deck-dots" id="deck-dots" aria-hidden="true"></div>
        <button type="button" class="deck-nav-btn deck-nav-btn--next" id="deck-next" aria-label="Next fact">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <p class="deck-helper">← → to navigate · space for why · S to save</p>

    </div>
  </main>

  <!-- Filter dialog (bottom-sheet on mobile, centered modal on desktop) -->
  <dialog class="deck-filter-dialog" id="deck-filter-dialog" aria-label="Filter facts">
    <form method="dialog" class="deck-filter-form">
      <header class="deck-filter-head">
        <h2 class="deck-filter-title">Filter facts</h2>
        <button type="button" class="deck-filter-close" id="deck-filter-close" aria-label="Close">×</button>
      </header>
      <div class="deck-filter-section">
        <span class="deck-filter-label">Subject</span>
        <div class="deck-filter-pills" role="radiogroup" aria-label="Subject">
          <button type="button" class="deck-fpill" data-filter="subject" data-value="all" aria-checked="true" role="radio">All</button>
          <button type="button" class="deck-fpill" data-filter="subject" data-value="math" aria-checked="false" role="radio">Math</button>
          <button type="button" class="deck-fpill" data-filter="subject" data-value="reading" aria-checked="false" role="radio">Reading</button>
          <button type="button" class="deck-fpill" data-filter="subject" data-value="science" aria-checked="false" role="radio">Science</button>
        </div>
      </div>
      <div class="deck-filter-section">
        <span class="deck-filter-label">Age</span>
        <div class="deck-filter-pills" role="radiogroup" aria-label="Age band">
          <button type="button" class="deck-fpill" data-filter="grade" data-value="all" aria-checked="true" role="radio">All ages</button>
          <button type="button" class="deck-fpill" data-filter="grade" data-value="k-2" aria-checked="false" role="radio">K–2</button>
          <button type="button" class="deck-fpill" data-filter="grade" data-value="3-4" aria-checked="false" role="radio">Grades 3–4</button>
          <button type="button" class="deck-fpill" data-filter="grade" data-value="5-8" aria-checked="false" role="radio">Grades 5–8</button>
        </div>
      </div>
      <footer class="deck-filter-foot">
        <button type="button" class="deck-filter-apply" id="deck-filter-apply">Apply</button>
      </footer>
    </form>
  </dialog>

  <footer class="product-footer" aria-label="Compliance and support">
    <a href="/parent.html" class="product-footer-link">Parent dashboard</a>
    <span class="product-footer-sep" aria-hidden="true">·</span>
    <a href="/legal/privacy.html" class="product-footer-link">Privacy</a>
    <span class="product-footer-sep" aria-hidden="true">·</span>
    <a href="/legal/terms.html" class="product-footer-link">Terms</a>
    <span class="product-footer-sep" aria-hidden="true">·</span>
    <a href="/legal/ai-disclosure.html" class="product-footer-link">AI Disclosure</a>
  </footer>

  <script>window.STAAR_TUTOR_ENDPOINT = 'https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com/';</script>
  <script src="js/auth.js?v=20260514a"></script>
  <script src="js/fun-facts.js?v=20260513a"></script>
  <script src="js/facts.js?v=20260516a"></script>
</body>
</html>
