  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title id="page-title">Pick a topic — GradeEarn</title>
  <meta id="page-description" name="description" content="Pick a math topic to practice — addition, subtraction, place value, fractions, and more. Or try mixed practice for variety.">
  <link id="page-canonical" rel="canonical" href="https://gradeearn.com/subject.html">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap">

<body class="grade-page practice-mode">

<header class="site-header">
  <div class="container">
    <a class="brand brand--wordmark" href="index.html" aria-label="GradeEarn home">
      <span class="brand-text">Grade<span class="brand-accent">Earn</span></span>
    </a>
    <nav class="nav" aria-label="Primary">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="achievements.html" data-i18n="nav.trophies">Trophies</a>
      <a href="marketplace.html" data-i18n="nav.toys">Toys</a>
      <a href="about.html" data-i18n="nav.howItWorks">How it works</a>
    </nav>
    <div id="user-slot" class="user-slot"></div>
  </div>
</header>

<main>
  <!-- Breadcrumb — mid-dot separator, "All states" dropped (kids
       don't think in terms of cross-state navigation). Hides
       compactly when no in-app referrer in the last 5 min. -->
  <nav class="breadcrumb-nav breadcrumb-nav--minimal" aria-label="Breadcrumb">
    <ol class="breadcrumb breadcrumb--mid-dot">
      <li class="breadcrumb-item">
        <a id="breadcrumb-state" href="states/?s=">—</a>
      </li>
      <li class="breadcrumb-item">
        <a id="breadcrumb-grade" href="grade.html">—</a>
      </li>
      <li class="breadcrumb-item breadcrumb-item--current" id="breadcrumb-subject">—</li>
    </ol>
  </nav>

  <!-- Loading -->
  <div class="state-page-loading" id="subject-loading">
    <span class="state-loading-spinner" aria-hidden="true"></span>
    <span>Loading topics…</span>
  </div>

  <!-- Error -->
  <section class="state-page-error" id="subject-error" hidden>
    <div class="state-error-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h2 class="state-error-title">We couldn't find that subject</h2>
    <p class="state-error-text">Pick a grade to start practicing.</p>
    <a class="state-error-cta" href="index.html#state-picker">
      <span>Back to start </span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </section>

  <!-- Main content. Minimalism pass: hero block deleted; subject-section
       collapses to a single H1 ("Math topics") plus the topic list. -->
  <article class="grade-content grade-content--topics" id="subject-content" hidden>
    <section class="subject-section subject-section--minimal">
      <header class="subject-section-head">
        <h1 class="subject-section-title" id="hero-title">Math topics</h1>
      </header>

      <div class="subject-grid topic-list" id="topic-grid">
        <!-- Filled by JS -->
      </div>

      <!-- §75 — Fun facts entry point. Subject + grade are appended
           by the subject-page wiring below so the link deep-links
           into the filtered feed (e.g. /facts.html?subj=math&age=3-4). -->
      <a class="subject-facts-link" id="subject-facts-link" href="/facts.html">
        <span class="subject-facts-link-icon" aria-hidden="true">✨</span>
        <span class="subject-facts-link-text">Browse fun facts</span>
        <span class="subject-facts-link-arrow" aria-hidden="true">→</span>
      </a>
    </section>
  </article>
</main>

<footer class="site-footer">
  <div class="container">
    <p class="footer-copyright">© 2026 GradeEarn. All rights reserved.</p>
    <nav class="footer-mobile-links">
      <a href="about.html" data-i18n="nav.howItWorks">How it works</a>
      <a href="#">Privacy</a>
      <a href="#">Support</a>
    </nav>
  </div>
</footer>

<!-- JS -->
<script src="js/fun-facts.js?v=20260517l"></script>
<script src="js/auth.js?v=20260517k"></script>
<script src="js/mastery.js?v=20260510a"></script>
<script src="js/subject-page.js?v=20260517b"></script>

  <script src="/js/site-header.js?v=20260517f"></script>
</body>
</html>
