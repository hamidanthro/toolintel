<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com https://api.gradeearn.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#060d1f" />
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <title>Word Connect — GradeEarn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css?v=20260511j" />
</head>
<body class="game-page game-word-connect">
  <header class="game-header">
    <a href="../games.html" class="game-back" aria-label="Back">‹</a>
    <div class="game-header-title">
      <div class="game-header-eyebrow"><span class="game-header-dot" aria-hidden="true"></span> WORD CONNECT</div>
      <div class="game-header-stat" id="gameHeaderStat">Find as many words as you can</div>
    </div>
    <div class="game-header-score">
      <div class="game-header-score-num" id="gameYourScore">0</div>
      <div class="game-header-score-label">your pts</div>
    </div>
  </header>

  <!-- Opponent strip — friends playing today's puzzle. Polls every ~5s.
       If kid has no friends, this hides; if friends haven't played
       today, shows '— not started —'. -->
  <div id="gameOpponents" class="game-opponents" hidden></div>

  <main class="game-main">
    <div id="gameStatus" class="game-status">Loading today's puzzle…</div>

    <!-- Discovered-words grid: each word becomes a card when found.
         Blank "_ _ _" placeholders for un-found words. -->
    <div id="gameWords" class="game-words"></div>

    <!-- Currently-spelled word preview (the kid's drag path) -->
    <div class="game-spell-row">
      <div id="gameSpellPreview" class="game-spell-preview">&nbsp;</div>
    </div>

    <!-- Letter wheel — 6 letters in a hex layout. Canvas overlay
         draws the drag path connecting them. -->
    <div class="game-wheel-wrap">
      <canvas id="gameWheelCanvas" class="game-wheel-canvas" aria-hidden="true"></canvas>
      <div id="gameWheel" class="game-wheel" role="application" aria-label="Letter wheel"></div>
      <button type="button" id="gameShuffle" class="game-shuffle" aria-label="Shuffle letters">⇄ Shuffle</button>
    </div>
  </main>

  <!-- End-of-game screen, hidden until complete -->
  <div id="gameComplete" class="game-complete" hidden>
    <div class="game-complete-card">
      <div class="game-complete-emoji" aria-hidden="true">🎉</div>
      <h2 id="gameCompleteTitle" class="game-complete-title">Nice run!</h2>
      <div class="game-complete-stats">
        <div class="game-complete-stat"><div class="game-complete-stat-num" id="gameCompleteScore">0</div><div class="game-complete-stat-label">points</div></div>
        <div class="game-complete-stat"><div class="game-complete-stat-num" id="gameCompleteWords">0/0</div><div class="game-complete-stat-label">words</div></div>
        <div class="game-complete-stat"><div class="game-complete-stat-num" id="gameCompleteTime">0:00</div><div class="game-complete-stat-label">time</div></div>
      </div>
      <div id="gameCompleteFriends" class="game-complete-friends"></div>
      <div class="game-complete-actions">
        <a href="../games.html" class="btn btn-secondary">Back to games</a>
        <a href="../league.html" class="btn btn-primary">See league →</a>
      </div>
    </div>
  </div>

  <div id="gameToast" class="game-toast" hidden role="status" aria-live="polite"></div>

  <script src="../js/auth.js?v=20260511c"></script>
  <script src="../js/games/word-connect.js?v=20260511a"></script>
</body>
</html>
