<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob: data: https:; connect-src 'self' https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com https://api.gradeearn.com https://api.openai.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060d1f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GradeEarn">
  <meta name="application-name" content="GradeEarn">
  <meta name="msapplication-TileColor" content="#060d1f">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <meta name="format-detection" content="telephone=no" />
  <meta name="robots" content="noindex">
  <title>Reset your password — GradeEarn</title>
  <meta name="description" content="Set a new password for your GradeEarn account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=20260517n" />
  <style>
    /* §50 reset-password page — minimal scoped styles. Reuses
       existing dark navy + gold theme from styles.css. */
    .reset-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      background: linear-gradient(180deg, #060d1f 0%, #04081a 100%);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .reset-shell {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .reset-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    .reset-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .reset-brand-text {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fff;
    }
    .reset-brand-accent { color: #fbbf24; }
    .reset-title {
      font-family: 'Instrument Serif', serif;
      font-size: 32px;
      font-weight: 400;
      line-height: 1.1;
      margin: 0 0 8px;
      color: #fff;
    }
    .reset-sub {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.7);
      margin: 0 0 24px;
    }
    .reset-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      margin: 0 0 8px;
    }
    .reset-input-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .reset-input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 10px;
      padding: 12px 44px 12px 14px;
      font-family: inherit;
      font-size: 15px;
      color: #fff;
      transition: border-color 0.18s ease, background 0.18s ease;
    }
    .reset-input::placeholder { color: rgba(255, 255, 255, 0.4); }
    .reset-input:focus {
      outline: none;
      border-color: rgba(251, 191, 36, 0.6);
      background: rgba(255, 255, 255, 0.08);
    }
    .reset-toggle {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .reset-toggle:hover { color: rgba(251, 191, 36, 0.85); }
    .reset-cta {
      width: 100%;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1a1208;
      border: 0;
      border-radius: 10px;
      padding: 14px 18px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: transform 0.12s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }
    .reset-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(251, 191, 36, 0.3); }
    .reset-cta:disabled { cursor: default; opacity: 0.6; transform: none; box-shadow: none; }
    .reset-msg {
      margin: 14px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .reset-msg-error {
      background: rgba(254, 202, 202, 0.08);
      border: 1px solid rgba(254, 202, 202, 0.35);
      color: #fecaca;
    }
    .reset-msg-success {
      background: rgba(167, 243, 208, 0.08);
      border: 1px solid rgba(167, 243, 208, 0.35);
      color: #a7f3d0;
    }
    .reset-link {
      display: inline-block;
      color: rgba(251, 191, 36, 0.85);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      margin-top: 14px;
    }
    .reset-link:hover { color: #fbbf24; }
    .reset-footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
    }
    @media (max-width: 480px) {
      .reset-card { padding: 24px 20px; border-radius: 14px; }
      .reset-title { font-size: 26px; }
    }
  </style>
</head>
<body class="reset-page">
  <main class="reset-shell">
    <div class="reset-card">
      <div class="reset-brand">
        <svg width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
          <defs>
            <linearGradient id="rpStarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fde047"/>
              <stop offset="55%" stop-color="#fbbf24"/>
              <stop offset="100%" stop-color="#f59e0b"/>
            </linearGradient>
          </defs>
          <path d="M16 2.6 19.6 11.5 29.2 12.2 21.8 18.4 24.2 27.6 16 22.4 7.8 27.6 10.2 18.4 2.8 12.2 12.4 11.5 Z" fill="url(#rpStarGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="0.6" stroke-linejoin="round"/>
        </svg>
        <span class="reset-brand-text">Grade<span class="reset-brand-accent">Earn</span></span>
      </div>

      <div id="rp-form-section">
        <h1 class="reset-title">Set a new password</h1>
        <p class="reset-sub" id="rp-sub">At least 8 characters with both letters and numbers. You'll sign in with this from now on.</p>

        <label class="reset-label" for="rp-pw1">New password</label>
        <div class="reset-input-wrap">
          <input id="rp-pw1" type="password" class="reset-input" autocomplete="new-password" placeholder="At least 8 chars, letters + numbers" minlength="8" maxlength="128" />
          <button type="button" class="reset-toggle" id="rp-toggle1" aria-label="Show password">SHOW</button>
        </div>

        <label class="reset-label" for="rp-pw2">Confirm new password</label>
        <div class="reset-input-wrap">
          <input id="rp-pw2" type="password" class="reset-input" autocomplete="new-password" placeholder="Type it again" minlength="8" maxlength="128" />
        </div>

        <button class="reset-cta" id="rp-submit">Reset password</button>

        <div id="rp-err" class="reset-msg reset-msg-error" hidden></div>
        <div id="rp-ok" class="reset-msg reset-msg-success" hidden></div>

        <a class="reset-link" href="index.html" id="rp-back">Back to sign in</a>
      </div>

      <div id="rp-no-token" class="reset-msg reset-msg-error" hidden>
        This link is invalid or has expired.
        <br><a class="reset-link" href="index.html">Request a new one →</a>
      </div>
    </div>
  </main>
  <footer class="reset-footer">
    &copy; <span id="year"></span> GradeEarn. All rights reserved.
  </footer>

  <script>
    (function () {
      const ENDPOINT = 'https://4wvuw21yjl.execute-api.us-east-1.amazonaws.com/';
      const params = new URLSearchParams(location.search);
      const token = params.get('token') || '';
      const yearEl = document.getElementById('year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();

      // Token presence check — invalid link = clean error.
      if (!token || token.length < 16) {
        document.getElementById('rp-form-section').hidden = true;
        document.getElementById('rp-no-token').hidden = false;
        return;
      }

      const pw1 = document.getElementById('rp-pw1');
      const pw2 = document.getElementById('rp-pw2');
      const btn = document.getElementById('rp-submit');
      const err = document.getElementById('rp-err');
      const okMsg = document.getElementById('rp-ok');
      const toggle1 = document.getElementById('rp-toggle1');

      // Show/hide password toggle on the first input. Confirm field
      // intentionally stays masked — kid types it from memory, not by
      // copy-paste; revealing both defeats the confirm purpose.
      toggle1.addEventListener('click', () => {
        if (pw1.type === 'password') {
          pw1.type = 'text';
          toggle1.textContent = 'HIDE';
        } else {
          pw1.type = 'password';
          toggle1.textContent = 'SHOW';
        }
      });

      async function api(action, body) {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, ...body })
        });
        let data = {};
        try { data = await res.json(); } catch (_) {}
        if (!res.ok) {
          const e = new Error(data.error || ('Request failed (' + res.status + ')'));
          e.status = res.status;
          throw e;
        }
        return data;
      }

      const submit = async () => {
        err.hidden = true;
        okMsg.hidden = true;
        const a = pw1.value || '';
        const b = pw2.value || '';
        if (a.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.hidden = false; return; }
        if (!/[a-zA-Z]/.test(a) || !/\d/.test(a)) { err.textContent = 'Password must include both letters and numbers.'; err.hidden = false; return; }
        if (a !== b) { err.textContent = "Those don't match. Try again."; err.hidden = false; return; }

        btn.disabled = true;
        btn.textContent = 'Updating…';
        try {
          await api('confirmPasswordReset', { token, newPassword: a });
          okMsg.textContent = 'Password updated. Taking you to sign in…';
          okMsg.hidden = false;
          pw1.disabled = true;
          pw2.disabled = true;
          btn.textContent = 'Done';
          setTimeout(() => { location.href = 'index.html'; }, 1800);
        } catch (e) {
          err.textContent = e.message || "Couldn't reset your password. Try requesting a new link.";
          err.hidden = false;
          btn.disabled = false;
          btn.textContent = 'Reset password';
        }
      };
      btn.addEventListener('click', submit);
      [pw1, pw2].forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
      setTimeout(() => pw1.focus(), 50);
    })();
  </script>
</body>
</html>
